  @file index.html
  @author EtherVox Development Team
  @description Main voting page for authenticated users to cast votes
  @version 1.0.0
  
  Features:
  - Responsive design for all devices
  - Real-time blockchain interaction
  - Secure voting interface
  - Candidate selection and voting
-->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://ajax.googleapis.com https://cdnjs.cloudflare.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data:; media-src 'self'; connect-src 'self' http://127.0.0.1:8000 http://localhost:8000 http://127.0.0.1:8001 http://localhost:8001 https://cdnjs.cloudflare.com ws: wss:;">
    <!-- Page title displayed in browser tab -->
    <title>Voting Page</title>

    <!-- Link to custom stylesheet for voting interface -->
    <link rel="stylesheet" type="text/css" href="/css/index.css">
    <link rel="stylesheet" type="text/css" href="/css/video-background.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
  </head>
  <body>
    <!-- Ethereum Background Image with Ultra HD Crystal Clear Animated Effects -->
    <div class="video-background">
      <div class="video-overlay crystal"></div>
      <div class="glow-effect"></div>
      <div class="particle-layer"></div>
      <div class="shimmer-effect"></div>
    </div>

    <!-- Logout button -->
    <div class="logout-container">
      <button id="logoutButton" class="logout-btn" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
    
    <!-- Main header section -->
    <div id="head" class="text-center">
      <h1 align="center">Decentralized Voting Using Ethereum Blockchain</h1>
      <h2 align="center">Welcome for Voting</h2> 
      <h3 align="center"><p>Voting Dates: <span id="dates"></span></p></h3>
      <br/> 
    </div>
    <div id="candidate" class="container"> 
      <table class="table text-center">
        <thead>
          <tr>
            <th>Name</th>
            <th>Party</th>
            <th>Total Vote</th>
          </tr>
        </thead>
        <tbody id="boxCandidate"></tbody>
      </table>
      <br/>
      <div id="vote">
        <p>Please select one of the candidates and click the vote button.</p>
        <button id="voteButton" class="btn btn-primary" onclick="App.vote()" disabled>Vote</button>
        <div id="msg"></div>
  
        <div id="vote-box"></div>
      </div>
    </div>
  
    <div id="account">
          <p id="accountAddress" class="text-center"></p>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.0/umd/popper.min.js"></script>
    <script src="/js/permanent-metamask.js"></script>
    <script>
      // Logout function for user page
      function logout() {
        if (confirm('🔐 Are you sure you want to logout?\n\nThis will end your current voting session.')) {
          try {
            localStorage.removeItem('jwtTokenVoter');
            localStorage.removeItem('jwtTokenAdmin');
            sessionStorage.clear();
            
            const logoutBtn = document.getElementById('logoutButton');
            if (logoutBtn) {
              logoutBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging out...';
              logoutBtn.disabled = true;
            }
            
            setTimeout(() => {
              window.location.replace('/login.html');
            }, 800);
          } catch (error) {
            console.error('Logout error:', error);
            window.location.replace('/login.html');
          }
        }
      }
    </script>  <script src=\"/js/video-background.js\"></script>  <script src="/app.bundle.js" type="module"></script>
  </body>
</html>
