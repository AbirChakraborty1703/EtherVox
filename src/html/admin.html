
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://ajax.googleapis.com https://cdnjs.cloudflare.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self' http://127.0.0.1:8000 http://localhost:8000 http://127.0.0.1:8001 http://localhost:8001 ws: wss:;">
    <title>Admin portal</title>

    <link rel="stylesheet" type="text/css" href="/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
  </head>
  <body>
    <!-- Logout button -->
    <div class="logout-container">
      <button id="logoutButton" class="logout-btn" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
    
    <div id="head" class="text-center">
      <h1 align="center" class="admin-title">Decentralized Voting Using Ethereum Blockchain</h1>
      <br/> 
    </div>

    <div class="container">
     <legend>Add Candidate</legend>  
     <form id="candidateForm" class="candidate-form">
       <div class="form-grid">
         <!-- Basic Information -->
         <div class="form-section">
           <h3>Basic Information</h3>
           <div class="form-group">
             <label for="name">Full Name *</label>
             <input id="name" type="text" name="name" placeholder="Candidate's full name" autocomplete="off" required>
           </div>
           
           <div class="form-group">
             <label for="age">Age *</label>
             <input id="age" type="number" name="age" placeholder="Age (18+)" min="18" max="120" required>
           </div>
           
           <div class="form-group">
             <label for="dateOfBirth">Date of Birth *</label>
             <input id="dateOfBirth" type="date" name="dateOfBirth" required>
           </div>
         </div>

         <!-- Contact Information -->
         <div class="form-section">
           <h3>Contact Information</h3>
           <div class="form-group">
             <label for="email">Email Address *</label>
             <input id="email" type="email" name="email" placeholder="candidate@example.com" required>
           </div>
           
           <div class="form-group">
             <label for="phoneNumber">Phone Number *</label>
             <input id="phoneNumber" type="tel" name="phoneNumber" placeholder="+1234567890" required>
           </div>
           
           <div class="form-group">
             <label for="candidateAddress">Personal Address *</label>
             <textarea id="candidateAddress" name="candidateAddress" placeholder="Full residential address" rows="3" required></textarea>
           </div>
         </div>

         <!-- Election Information -->
         <div class="form-section">
           <h3>Election Information</h3>
           <div class="form-group">
             <label for="party">Political Party *</label>
             <input id="party" type="text" name="party" placeholder="Party name" required>
           </div>
           
           <div class="form-group">
             <label for="electionCenter">Election Center Address *</label>
             <textarea id="electionCenter" name="electionCenter" placeholder="Election center full address" rows="3" required></textarea>
           </div>
           
           <div class="form-group">
             <label for="electionStartDate">Election Start Date *</label>
             <input id="electionStartDate" type="datetime-local" name="electionStartDate" required>
           </div>
           
           <div class="form-group">
             <label for="electionEndDate">Election End Date *</label>
             <input id="electionEndDate" type="datetime-local" name="electionEndDate" required>
           </div>
         </div>

         <!-- Credentials -->
         <div class="form-section">
           <h3>Candidate Credentials</h3>
           <div class="form-group">
             <label for="candidateId">Unique Candidate ID *</label>
             <input id="candidateId" type="text" name="candidateId" placeholder="CID-XXXX-XXXX" pattern="[A-Za-z0-9\-]+" required>
           </div>
           
           <div class="form-group">
             <label for="candidatePassword">Candidate Password *</label>
             <input id="candidatePassword" type="password" name="candidatePassword" placeholder="Secure password" minlength="8" required>
           </div>
           
           <div class="form-group">
             <label for="confirmPassword">Confirm Password *</label>
             <input id="confirmPassword" type="password" name="confirmPassword" placeholder="Confirm password" minlength="8" required>
           </div>
         </div>
       </div>
       
       <div class="form-actions">
         <button id="addCandidate" type="submit" class="btn-primary">Add Candidate</button>
         <button type="reset" class="btn-secondary">Clear Form</button>
       </div>
     </form>
     <div id="candidateStatus" class="status-message"></div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.0/umd/popper.min.js"></script>
    <script src="/js/bulletproof-setup.js"></script>
    <script>
      // Global logout function
      function logout() {
        // Clear any stored authentication tokens
        localStorage.removeItem('jwtTokenVoter');
        localStorage.removeItem('jwtTokenAdmin');
        sessionStorage.clear();
        
        // Show confirmation message
        if (confirm('Are you sure you want to logout?')) {
          // Redirect to login page
          window.location.replace('http://localhost:8081/login.html');
        }
      }
    </script>
  <script src="/app.bundle.js" type="module"></script>
  </body>
</html>
