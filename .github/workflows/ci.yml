name: EtherVox CI/CD Pipeline

on:
  push:
    branches: [ main, Ethereum-Chain, fix-cicd-dependencies ]
  pull_request:
    branches: [ main, Ethereum-Chain ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        
    - name: Clear npm cache
      run: npm cache clean --force
      
    - name: Install dependencies with platform compatibility
      run: |
        npm config set target_platform linux
        npm config set target_arch x64
        npm install --no-optional --ignore-scripts
      continue-on-error: false
      
    - name: Build frontend
      run: npm run build
      continue-on-error: true
      
    - name: Check for security vulnerabilities
      run: npm audit --audit-level moderate
      continue-on-error: true
      
  contracts:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        
    - name: Install dependencies with platform compatibility
      run: |
        npm config set target_platform linux
        npm config set target_arch x64
        npm install --no-optional --ignore-scripts
      continue-on-error: false
        
    - name: Install Truffle globally
      run: npm install -g truffle@5.11.5
      
    - name: Compile smart contracts
      run: npm run compile
      continue-on-error: true
      
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [16.x, 18.x]
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        
    - name: Install dependencies with platform compatibility
      run: |
        npm config set target_platform linux
        npm config set target_arch x64
        npm install --no-optional --ignore-scripts
      continue-on-error: false
      
    - name: Install Truffle globally
      run: npm install -g truffle@5.11.5
      
    - name: Setup Ganache for testing
      run: |
        npm install -g ganache-cli
        ganache-cli --deterministic --accounts 10 --host 0.0.0.0 --port 8545 &
        sleep 5
      continue-on-error: true
      
    - name: Run tests
      run: npm test
      continue-on-error: true
      
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        
    - name: Install dependencies with platform compatibility
      run: |
        npm config set target_platform linux
        npm config set target_arch x64
        npm install --no-optional --ignore-scripts
      continue-on-error: false
      
    - name: Run ESLint (if configured)
      run: |
        if [ -f ".eslintrc.js" ] || [ -f ".eslintrc.json" ] || [ -f "eslint.config.js" ]; then
          npm run lint:check || echo "Linting completed with warnings"
        else
          echo "No ESLint configuration found, skipping lint check"
        fi
      continue-on-error: true
